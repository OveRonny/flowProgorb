name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve Static Web Apps token
        id: resolve-token
        env:
          SWA_TOKEN_PRIMARY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SWA_TOKEN_LEGACY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E }}
        run: |
          if [ -n "$SWA_TOKEN_LEGACY" ]; then
            echo "SWA_TOKEN=$SWA_TOKEN_LEGACY" >> "$GITHUB_ENV"
            echo "token_source=AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E" >> "$GITHUB_OUTPUT"
          elif [ -n "$SWA_TOKEN_PRIMARY" ]; then
            echo "SWA_TOKEN=$SWA_TOKEN_PRIMARY" >> "$GITHUB_ENV"
            echo "token_source=AZURE_STATIC_WEB_APPS_API_TOKEN" >> "$GITHUB_OUTPUT"
          else
            echo "token_source=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate resolved token
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "::error::No Static Web Apps token resolved. Set AZURE_STATIC_WEB_APPS_API_TOKEN or AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E."
            exit 1
          fi
          echo "Using token source: ${{ steps.resolve-token.outputs.token_source }}"
          echo "Resolved token length: ${#SWA_TOKEN}"

      - name: Build frontend
        run: npm run build

      - name: Deploy frontend
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./frontend-vue
          api_location: ''
          output_location: dist
          skip_app_build: true
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Resolve Static Web Apps token
        id: resolve-token
        env:
          SWA_TOKEN_PRIMARY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SWA_TOKEN_LEGACY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E }}
        run: |
          if [ -n "$SWA_TOKEN_LEGACY" ]; then
            echo "SWA_TOKEN=$SWA_TOKEN_LEGACY" >> "$GITHUB_ENV"
          elif [ -n "$SWA_TOKEN_PRIMARY" ]; then
            echo "SWA_TOKEN=$SWA_TOKEN_PRIMARY" >> "$GITHUB_ENV"
          fi

      - name: Close Pull Request
        if: ${{ env.SWA_TOKEN != '' }}
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: close