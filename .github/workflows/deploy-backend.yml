name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      - name: Check deployment secrets
        id: check-secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$JWT_SECRET" ] || [ -z "$FRONTEND_URL" ]; then
            echo "::warning::One or more secrets are missing. Azure App Settings update will be skipped to avoid overwriting existing values."
            echo "should_configure=false" >> "$GITHUB_OUTPUT"
          else
            echo "All required secrets are present."
            echo "should_configure=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Azure auth mode
        id: azure-auth
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
        run: |
          if [ -n "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "mode=publish-profile" >> "$GITHUB_OUTPUT"
            echo "Using publish profile deployment mode."
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Using OIDC deployment mode."
          fi

      - name: Check Azure login secrets
        if: steps.azure-auth.outputs.mode == 'oidc'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || secrets.AZUREAPPSERVICE_CLIENTID_A3FE6FA0EB3C4FB1A904A24E793784CC }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || secrets.AZUREAPPSERVICE_TENANTID_002F50EAA7DA43F4BE1E622D56BA152E }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_06602A59FF87467483AB0531DCD5A3AD }}
        run: |
          missing=""
          if [ -z "$AZURE_CLIENT_ID" ]; then missing="$missing AZURE_CLIENT_ID"; fi
          if [ -z "$AZURE_TENANT_ID" ]; then missing="$missing AZURE_TENANT_ID"; fi
          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then missing="$missing AZURE_SUBSCRIPTION_ID"; fi

          if [ -n "$missing" ]; then
            echo "::error::Missing required Azure login secret(s):$missing"
            echo "::error::Set these in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Azure login (OIDC)
        if: steps.azure-auth.outputs.mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || secrets.AZUREAPPSERVICE_CLIENTID_A3FE6FA0EB3C4FB1A904A24E793784CC }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || secrets.AZUREAPPSERVICE_TENANTID_002F50EAA7DA43F4BE1E622D56BA152E }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_06602A59FF87467483AB0531DCD5A3AD }}

      - name: Deploy to Azure App Service (publish profile)
        if: steps.azure-auth.outputs.mode == 'publish-profile'
        uses: azure/webapps-deploy@v3
        with:
          app-name: flowprogorb-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: backend

      - name: Deploy to Azure App Service (OIDC)
        if: steps.azure-auth.outputs.mode == 'oidc'
        uses: azure/webapps-deploy@v3
        with:
          app-name: flowprogorb-api
          package: backend

      - name: Configure Azure App Service settings
        uses: azure/appservice-settings@v1
        if: steps.check-secrets.outputs.should_configure == 'true' && steps.azure-auth.outputs.mode == 'oidc'
        with:
          app-name: flowprogorb-api
          app-settings-json: |
            [
              {
                "name": "DATABASE_URL",
                "value": "${{ secrets.DATABASE_URL }}",
                "slotSetting": false
              },
              {
                "name": "JWT_SECRET",
                "value": "${{ secrets.JWT_SECRET }}",
                "slotSetting": false
              },
              {
                "name": "FRONTEND_URL",
                "value": "${{ secrets.FRONTEND_URL }}",
                "slotSetting": false
              }
            ]

      - name: App settings note for publish profile mode
        if: steps.check-secrets.outputs.should_configure == 'true' && steps.azure-auth.outputs.mode == 'publish-profile'
        run: |
          echo "::warning::Deployment succeeded with publish profile mode."
          echo "::warning::App settings update step was skipped because it requires Azure login permissions."
