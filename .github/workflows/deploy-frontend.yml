name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'frontend-vue/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      id-token: write
      contents: read

    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E }}

    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install OIDC client
        if: ${{ github.event.action != 'closed' && env.SWA_TOKEN != '' }}
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get GitHub ID token
        if: ${{ github.event.action != 'closed' && env.SWA_TOKEN != '' }}
        uses: actions/github-script@v7
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        if: ${{ github.event.action != 'closed' }}
        run: npm run build

      - name: Deploy frontend
        if: ${{ github.event.action != 'closed' && env.SWA_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend-vue'
          output_location: 'dist'
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Close preview environment
        if: ${{ github.event.action == 'closed' && env.SWA_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'close'

      - name: Skip deploy without token
        if: ${{ env.SWA_TOKEN == '' }}
        run: echo "Skipping Azure Static Web Apps deployment because AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E is not configured for this run."

      - name: Fail main push when frontend token is missing
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SWA_TOKEN == '' }}
        run: |
          echo "::error::Missing Static Web Apps deployment token. Set AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E."
          exit 1
