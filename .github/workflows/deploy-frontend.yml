name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'frontend-vue/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve Static Web Apps token
        id: resolve-token
        env:
          SWA_TOKEN_PRIMARY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SWA_TOKEN_LEGACY: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E }}
        run: |
          if [ -n "$SWA_TOKEN_PRIMARY" ]; then
            echo "SWA_TOKEN=$SWA_TOKEN_PRIMARY" >> "$GITHUB_ENV"
            echo "token_source=AZURE_STATIC_WEB_APPS_API_TOKEN" >> "$GITHUB_OUTPUT"
          elif [ -n "$SWA_TOKEN_LEGACY" ]; then
            echo "SWA_TOKEN=$SWA_TOKEN_LEGACY" >> "$GITHUB_ENV"
            echo "token_source=AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E" >> "$GITHUB_OUTPUT"
          else
            echo "token_source=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate resolved token
        if: ${{ github.event.action != 'closed' }}
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "::error::No Static Web Apps token resolved. Set AZURE_STATIC_WEB_APPS_API_TOKEN or AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E."
            exit 1
          fi
          echo "Using token source: ${{ steps.resolve-token.outputs.token_source }}"
          echo "Resolved token length: ${#SWA_TOKEN}"

      - name: Build frontend
        if: ${{ github.event.action != 'closed' }}
        run: npm run build

      - name: Deploy frontend (attempt 1)
        id: deploy_frontend_attempt_1
        continue-on-error: true
        if: ${{ github.event.action != 'closed' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend-vue'
          output_location: 'dist'
          skip_app_build: true
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy frontend (attempt 2)
        id: deploy_frontend_attempt_2
        if: ${{ github.event.action != 'closed' && steps.deploy_frontend_attempt_1.outcome == 'failure' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend-vue'
          output_location: 'dist'
          skip_app_build: true
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Fail if frontend deploy did not succeed
        if: ${{ github.event.action != 'closed' && steps.deploy_frontend_attempt_1.outcome == 'failure' && steps.deploy_frontend_attempt_2.outcome != 'success' }}
        run: |
          echo "::error::Azure Static Web Apps deploy failed after retry. Verify token source (${{ steps.resolve-token.outputs.token_source }}) maps to the target Static Web App resource."
          exit 1

      - name: Close preview environment
        if: ${{ github.event.action == 'closed' && env.SWA_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'close'

      - name: Skip deploy without token
        if: ${{ env.SWA_TOKEN == '' && github.event.action == 'closed' }}
        run: echo "Skipping close action because no Static Web Apps token is configured for this run."

      - name: Fail main push when frontend token is missing
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SWA_TOKEN == '' }}
        run: |
          echo "::error::Missing Static Web Apps deployment token. Set AZURE_STATIC_WEB_APPS_API_TOKEN or AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_00225B21E."
          exit 1
